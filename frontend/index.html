<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Информационная панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #07111f;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }
        .hidden { display: none !important; }

        .code-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 25% 20%, #244a80 0, transparent 35%), linear-gradient(135deg, #07111f, #121b33 70%);
        }
        .code-card {
            width: min(520px, 92vw);
            padding: 44px 48px;
            border-radius: 28px;
            background: rgba(14, 27, 48, 0.94);
            box-shadow: 0 24px 80px rgba(0,0,0,0.55);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .code-card h1 { font-size: 2.35rem; margin-bottom: 10px; }
        .code-card p { color: #9eb0ca; margin-bottom: 28px; }
        .code-row { display: flex; justify-content: center; gap: 12px; }
        #codeInput {
            width: 132px;
            padding: 15px 18px;
            border-radius: 14px;
            border: 2px solid #344a6f;
            background: #07111f;
            color: #fff;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            font-family: monospace;
        }
        #codeInput:focus { border-color: #66a8ff; }
        #codeSubmitBtn {
            padding: 15px 28px;
            border: 0;
            border-radius: 14px;
            background: #2f8cff;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
        }
        #codeSubmitBtn:disabled { opacity: 0.6; cursor: wait; }
        #codeStatus { min-height: 26px; margin-top: 18px; color: #9eb0ca; }
        #codeStatus.error { color: #ff7b7b; }
        #codeStatus.success { color: #72e38f; }
        .code-note { margin-top: 18px; color: #6e809b; font-size: 0.92rem; }

        .slide-root {
            position: fixed;
            inset: 0;
            background: #07111f;
            overflow: hidden;
        }
        .slide {
            width: 100%;
            height: 100%;
            padding: 7vh 7vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: appear 0.45s ease;
        }
        @keyframes appear {
            from { opacity: 0; transform: scale(0.985); }
            to { opacity: 1; transform: scale(1); }
        }
        .slide h1 { font-size: clamp(3rem, 7vw, 7.5rem); line-height: 1.05; margin-bottom: 0.35em; }
        .slide h2 { font-size: clamp(2.4rem, 5vw, 5rem); line-height: 1.1; margin-bottom: 0.25em; }
        .slide p { font-size: clamp(1.6rem, 3vw, 3.4rem); line-height: 1.25; max-width: 1400px; white-space: pre-wrap; }
        .slide small { font-size: clamp(1rem, 1.5vw, 1.4rem); color: rgba(255,255,255,0.72); margin-top: 1.4rem; }

        .slide-announcement { background: linear-gradient(135deg, #173a71, #071b35 75%); }
        .slide-announcement.urgent { background: linear-gradient(135deg, #852121, #2a0710 75%); }
        .slide-image { background: linear-gradient(135deg, #111827, #020617 75%); gap: 2rem; }
        .slide-image img {
            max-width: min(82vw, 1500px);
            max-height: 68vh;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(0,0,0,0.5);
            background: rgba(255,255,255,0.04);
        }
        .slide-greeting { background: radial-gradient(circle at 50% 15%, rgba(255,255,255,0.20), transparent 28%), linear-gradient(135deg, #b83a7d, #6e2fc9); }
        .slide-greeting .name { font-size: clamp(3.5rem, 8vw, 8.5rem); font-weight: 800; margin: 0.08em 0 0.18em; }
        .slide-metric { background: #05110c; color: #d6ffe8; font-family: "Consolas", "Courier New", monospace; }
        .slide-metric .value { font-size: clamp(5rem, 13vw, 14rem); font-weight: 800; line-height: 1; margin: 0.18em 0; }
        .slide-metric .trend { font-size: clamp(1.8rem, 3.2vw, 3.6rem); }
        .trend-up { color: #72e38f; }
        .trend-down { color: #ff7b7b; }
        .trend-stable { color: #ffd36a; }
        .empty-state, .loading-state {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            color: #dbe8ff; background: linear-gradient(135deg, #07111f, #111c33);
        }
        .empty-state h1, .loading-state h1 { font-size: clamp(2.5rem, 6vw, 6rem); margin-bottom: 0.25em; }
        .empty-state p, .loading-state p { font-size: clamp(1.2rem, 2.2vw, 2.5rem); color: #9eb0ca; }

        .status-bar {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 18px;
            align-items: center;
            max-width: 94vw;
            padding: 8px 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.58);
            color: #b5c2d8;
            font-size: 13px;
            backdrop-filter: blur(12px);
            white-space: nowrap;
        }
        #statusIndicator {
            width: 10px; height: 10px; border-radius: 50%;
            background: #72e38f;
            box-shadow: 0 0 14px #72e38f;
        }
        #statusIndicator.offline { background: #ff7b7b; box-shadow: 0 0 14px #ff7b7b; }
        #statusIndicator.cached { background: #ffd36a; box-shadow: 0 0 14px #ffd36a; }
        #screenCodeDisplay, #slideCounter { font-family: Consolas, monospace; color: #dbe8ff; }

        @media (max-width: 768px) {
            .code-card { padding: 32px 22px; }
            .code-row { flex-direction: column; align-items: center; }
            #codeInput, #codeSubmitBtn { width: min(230px, 100%); }
            .status-bar { font-size: 11px; gap: 9px; }
        }
    </style>
</head>
<body>
    <div id="codeScreen" class="code-screen">
        <div class="code-card">
            <h1>Код экрана</h1>
            <p>Введите 3-значный код, выданный HR. После первой привязки экран сможет работать из локального кэша.</p>
            <div class="code-row">
                <input id="codeInput" maxlength="3" placeholder="000" inputmode="numeric" autocomplete="off" autofocus />
                <button id="codeSubmitBtn">Подключить</button>
            </div>
            <div id="codeStatus"></div>
            <div class="code-note">Для выхода из полноэкранного режима используйте системные средства устройства.</div>
        </div>
    </div>

    <main id="slideRoot" class="slide-root hidden">
        <div class="loading-state">
            <h1>Загрузка...</h1>
            <p>Подготовка экрана</p>
        </div>
    </main>

    <div id="statusBar" class="status-bar hidden">
        <span id="statusIndicator"></span>
        <span id="statusText">Запуск</span>
        <span id="slideCounter">0 / 0</span>
        <span id="screenCodeDisplay"></span>
        <span id="cacheInfo"></span>
    </div>

    <script>
        "use strict";

        const API_BASE = window.location.origin + "/api";
        const WS_PROTOCOL = window.location.protocol === "https:" ? "wss:" : "ws:";
        const WS_URL = WS_PROTOCOL + "//" + window.location.host + "/ws/slides";

        const SLIDE_DURATION_MS = 15000;
        const REFRESH_INTERVAL_MS = 5 * 60 * 1000;
        const HEARTBEAT_INTERVAL_MS = 5 * 60 * 1000;
        const CACHE_KEY = "digital_signage_slide_cache_v2";
        const SCREEN_CODE_KEY = "screen_code";
        const SERVER_OFFSET_KEY = "digital_signage_server_offset_ms";
        const IMAGE_CACHE_NAME = "digital_signage_images_v1";

        const codeScreen = document.getElementById("codeScreen");
        const slideRoot = document.getElementById("slideRoot");
        const statusBar = document.getElementById("statusBar");
        const codeInput = document.getElementById("codeInput");
        const codeSubmitBtn = document.getElementById("codeSubmitBtn");
        const codeStatus = document.getElementById("codeStatus");
        const statusIndicator = document.getElementById("statusIndicator");
        const statusText = document.getElementById("statusText");
        const slideCounter = document.getElementById("slideCounter");
        const screenCodeDisplay = document.getElementById("screenCodeDisplay");
        const cacheInfo = document.getElementById("cacheInfo");

        let screenCode = localStorage.getItem(SCREEN_CODE_KEY) || "";
        let allSlides = [];
        let lastRenderedSlideId = null;
        let renderTimer = null;
        let refreshTimer = null;
        let heartbeatTimer = null;
        let websocket = null;
        let reconnectTimer = null;
        let serverOffsetMs = Number(localStorage.getItem(SERVER_OFFSET_KEY) || 0);
        let isOnline = false;
        let usingCache = false;
        let objectUrls = [];

        document.addEventListener("contextmenu", event => event.preventDefault());
        document.addEventListener("keydown", event => {
            const key = event.key.toLowerCase();
            if ((event.ctrlKey && ["r", "w", "u"].includes(key)) || key === "f5") {
                event.preventDefault();
            }
        });

        codeInput.addEventListener("input", () => {
            codeInput.value = codeInput.value.replace(/\D/g, "").slice(0, 3);
            if (codeInput.value.length === 3) {
                window.setTimeout(() => codeSubmitBtn.click(), 150);
            }
        });
        codeInput.addEventListener("keydown", event => {
            if (event.key === "Enter") codeSubmitBtn.click();
        });
        codeSubmitBtn.addEventListener("click", async () => {
            const code = codeInput.value.trim();
            if (!/^\d{3}$/.test(code)) {
                setCodeStatus("Введите ровно 3 цифры", "error");
                return;
            }
            codeSubmitBtn.disabled = true;
            setCodeStatus("Проверка кода...", "");
            const result = await activateScreen(code, { allowCachedFallback: false });
            codeSubmitBtn.disabled = false;
            if (result.ok) {
                screenCode = code;
                localStorage.setItem(SCREEN_CODE_KEY, code);
                setCodeStatus("Экран подключён", "success");
                window.setTimeout(startPlayer, 250);
            } else {
                setCodeStatus(result.message, "error");
            }
        });

        init();

        async function init() {
            const cached = loadCachedSlides();
            if (cached.length > 0) {
                allSlides = cached;
                usingCache = true;
            }

            if (screenCode) {
                const result = await activateScreen(screenCode, { allowCachedFallback: true });
                if (result.ok || cached.length > 0) {
                    startPlayer();
                    return;
                }
                localStorage.removeItem(SCREEN_CODE_KEY);
                screenCode = "";
            }

            showCodeScreen();
        }

        function showCodeScreen() {
            codeScreen.classList.remove("hidden");
            slideRoot.classList.add("hidden");
            statusBar.classList.add("hidden");
            codeInput.value = "";
            codeInput.focus();
        }

        async function startPlayer() {
            codeScreen.classList.add("hidden");
            slideRoot.classList.remove("hidden");
            statusBar.classList.remove("hidden");
            screenCodeDisplay.textContent = screenCode ? "Экран: " + screenCode : "Экран: автономный";

            if (allSlides.length === 0) showLoading("Загрузка слайдов", "Получение данных с сервера");
            else renderSyncedSlide();

            await refreshSlides({ silent: allSlides.length > 0 });
            startRenderLoop();
            startRefreshLoop();
            startHeartbeatLoop();
            connectWebSocket();
        }

        async function activateScreen(code, options) {
            try {
                const response = await fetch(API_BASE + "/screens/activate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code }),
                    cache: "no-store"
                });
                syncClockFromResponse(response, Date.now(), Date.now());
                if (!response.ok) {
                    let message = "Ошибка активации";
                    try {
                        const error = await response.json();
                        message = error.detail || message;
                    } catch (_) {}
                    return { ok: false, message };
                }
                isOnline = true;
                usingCache = false;
                updateStatus();
                return { ok: true };
            } catch (_) {
                isOnline = false;
                updateStatus();
                if (options && options.allowCachedFallback && loadCachedSlides().length > 0) {
                    return { ok: true, offline: true };
                }
                return { ok: false, message: "Сервер недоступен. Без ранее сохранённого кэша экран подключить нельзя." };
            }
        }

        async function refreshSlides(options) {
            const silent = options && options.silent;
            try {
                const remoteSlides = await fetchSlidesFromServer();
                allSlides = normalizeSlides(remoteSlides);
                saveCachedSlides(allSlides);
                cacheImagesForSlides(allSlides);
                isOnline = true;
                usingCache = false;
                updateStatus();
                renderSyncedSlide(true);
            } catch (_) {
                const cachedSlides = loadCachedSlides();
                if (cachedSlides.length > 0) {
                    allSlides = normalizeSlides(cachedSlides);
                    isOnline = false;
                    usingCache = true;
                    updateStatus();
                    renderSyncedSlide(true);
                } else {
                    isOnline = false;
                    usingCache = false;
                    updateStatus();
                    if (!silent) showEmptyState("Нет доступных слайдов", "Сервер недоступен, а локальный кэш пуст");
                }
            }
        }

        async function fetchSlidesFromServer() {
            try {
                return await requestSlideList("/slides/active");
            } catch (_) {
                const all = await requestSlideList("/slides");
                return normalizeSlides(all).filter(slide => isSlideActive(slide, getSyncedNowMs()));
            }
        }

        async function requestSlideList(path) {
            const startedAt = Date.now();
            const response = await fetch(API_BASE + path + (path.includes("?") ? "&" : "?") + "_=" + Date.now(), {
                cache: "no-store"
            });
            const endedAt = Date.now();
            syncClockFromResponse(response, startedAt, endedAt);
            if (!response.ok) throw new Error("HTTP " + response.status);
            const data = await response.json();
            if (!Array.isArray(data)) throw new Error("Invalid slide list");
            return data;
        }

        function syncClockFromResponse(response, startedAt, endedAt) {
            const dateHeader = response.headers.get("Date");
            if (!dateHeader) return;
            const serverTime = Date.parse(dateHeader);
            if (Number.isNaN(serverTime)) return;
            const localMiddle = Math.floor((startedAt + endedAt) / 2);
            serverOffsetMs = serverTime - localMiddle;
            localStorage.setItem(SERVER_OFFSET_KEY, String(serverOffsetMs));
        }

        function getSyncedNowMs() {
            return Date.now() + serverOffsetMs;
        }

        function normalizeSlides(slides) {
            return (Array.isArray(slides) ? slides : [])
                .filter(slide => slide && typeof slide === "object")
                .map(slide => ({
                    ...slide,
                    priority: Number(slide.priority || 0),
                    id: slide.id ?? stableSlideId(slide)
                }))
                .sort((a, b) => {
                    if (b.priority !== a.priority) return b.priority - a.priority;
                    const aStart = parseDateMs(a.start_date || a.startAt) || 0;
                    const bStart = parseDateMs(b.start_date || b.startAt) || 0;
                    if (aStart !== bStart) return aStart - bStart;
                    return String(a.id).localeCompare(String(b.id));
                });
        }

        function stableSlideId(slide) {
            return [slide.type, slide.title, slide.content, slide.start_date, slide.end_date].join("|");
        }

        function getActiveSlides() {
            const now = getSyncedNowMs();
            return normalizeSlides(allSlides).filter(slide => isSlideActive(slide, now));
        }

        function isSlideActive(slide, nowMs) {
            if (slide.is_active === false) return false;
            const start = parseDateMs(slide.start_date || slide.startAt || slide.start_at);
            const end = parseDateMs(slide.end_date || slide.endAt || slide.end_at);
            if (start !== null && nowMs < start) return false;
            if (end !== null && nowMs > end) return false;
            return true;
        }

        function parseDateMs(value) {
            if (!value) return null;
            const ms = Date.parse(value);
            return Number.isNaN(ms) ? null : ms;
        }

        function startRenderLoop() {
            if (renderTimer) clearTimeout(renderTimer);
            const now = getSyncedNowMs();
            const delayToNextSlot = SLIDE_DURATION_MS - (now % SLIDE_DURATION_MS) + 25;
            renderTimer = window.setTimeout(() => {
                renderSyncedSlide();
                startRenderLoop();
            }, delayToNextSlot);
        }

        function startRefreshLoop() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = window.setInterval(() => refreshSlides({ silent: true }), REFRESH_INTERVAL_MS);
        }

        function startHeartbeatLoop() {
            if (heartbeatTimer) clearInterval(heartbeatTimer);
            if (!screenCode) return;
            heartbeatTimer = window.setInterval(async () => {
                if (!isOnline) return;
                try {
                    await fetch(API_BASE + "/screens/heartbeat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ code: screenCode }),
                        cache: "no-store"
                    });
                } catch (_) {}
            }, HEARTBEAT_INTERVAL_MS);
        }

        function renderSyncedSlide(force) {
            const activeSlides = getActiveSlides();
            if (activeSlides.length === 0) {
                lastRenderedSlideId = null;
                showEmptyState("Нет активных слайдов", "Экран продолжит проверять обновления");
                slideCounter.textContent = "0 / 0";
                return;
            }

            const now = getSyncedNowMs();
            const slot = Math.floor(now / SLIDE_DURATION_MS);
            const index = slot % activeSlides.length;
            const slide = activeSlides[index];
            const renderKey = String(slide.id) + ":" + index + ":" + activeSlides.length;

            slideCounter.textContent = (index + 1) + " / " + activeSlides.length;
            if (!force && lastRenderedSlideId === renderKey) return;
            lastRenderedSlideId = renderKey;

            revokeObjectUrls();
            slideRoot.innerHTML = renderSlide(slide);
            hydrateRenderedImages();
        }

        function renderSlide(slide) {
            const type = String(slide.type || "text").toLowerCase();
            if (["image", "picture", "photo"].includes(type)) return renderImageSlide(slide);
            if (["greeting", "birthday", "congratulation", "congratulations", "celebration"].includes(type)) return renderGreetingSlide(slide);
            if (["metric", "indicator", "kpi"].includes(type)) return renderMetricSlide(slide);
            return renderAnnouncementSlide(slide);
        }

        function renderAnnouncementSlide(slide) {
            const urgentClass = Number(slide.priority || 0) > 0 ? " urgent" : "";
            return `
                <section class="slide slide-announcement${urgentClass}">
                    <h1>${escapeHtml(slide.title || "Объявление")}</h1>
                    <p>${escapeHtml(slide.content || "")}</p>
                </section>
            `;
        }

        function renderImageSlide(slide) {
            const extra = slide.extra_data || {};
            const src = getImageSource(slide);
            const caption = slide.title || extra.caption || slide.content || "";
            return `
                <section class="slide slide-image">
                    ${src ? `<img src="${escapeAttribute(src)}" data-cache-url="${escapeAttribute(toAbsoluteUrl(src))}" alt="${escapeAttribute(caption || "Изображение")}" />` : ""}
                    ${caption ? `<p>${escapeHtml(caption)}</p>` : ""}
                </section>
            `;
        }

        function renderGreetingSlide(slide) {
            const extra = slide.extra_data || {};
            const name = extra.name || extra.full_name || extra.person_name || extra.employee || slide.title || "Сотрудник";
            const reason = extra.reason || extra.occasion || slide.content || "Поздравляем!";
            const photo = extra.photo_path || extra.photo || extra.image_url || extra.imagePath || "";
            return `
                <section class="slide slide-greeting">
                    <h2>Поздравляем!</h2>
                    ${photo ? `<img src="${escapeAttribute(photo)}" data-cache-url="${escapeAttribute(toAbsoluteUrl(photo))}" alt="${escapeAttribute(name)}" style="max-height: 28vh; max-width: 28vh; border-radius: 50%; object-fit: cover; margin-bottom: 2rem; box-shadow: 0 18px 50px rgba(0,0,0,0.35);" />` : ""}
                    <div class="name">${escapeHtml(name)}</div>
                    <p>${escapeHtml(reason)}</p>
                </section>
            `;
        }

        function renderMetricSlide(slide) {
            const extra = slide.extra_data || {};
            const label = slide.title || extra.label || extra.name || "Показатель";
            const value = extra.value ?? slide.content ?? "—";
            const unit = extra.unit ? " " + extra.unit : "";
            const trendRaw = String(extra.trend || "stable").toLowerCase();
            const trendClass = trendRaw.includes("down") || trendRaw.includes("-") || trendRaw === "падение" ? "trend-down" :
                trendRaw.includes("up") || trendRaw.includes("+") || trendRaw === "рост" ? "trend-up" : "trend-stable";
            const trendLabel = extra.trend_label || extra.trendText || extra.trend || "без изменений";
            return `
                <section class="slide slide-metric">
                    <h2>${escapeHtml(label)}</h2>
                    <div class="value">${escapeHtml(String(value))}${escapeHtml(unit)}</div>
                    <div class="trend ${trendClass}">${escapeHtml(String(trendLabel))}</div>
                    ${extra.updated_at ? `<small>Обновлено: ${escapeHtml(formatDate(extra.updated_at))}</small>` : ""}
                </section>
            `;
        }

        function getImageSource(slide) {
            const extra = slide.extra_data || {};
            return extra.image_url || extra.imagePath || extra.image_path || extra.path || extra.url || slide.image_url || slide.content || "";
        }

        async function cacheImagesForSlides(slides) {
            if (!("caches" in window)) return;
            const urls = [...new Set(slides.map(getImageSource).filter(Boolean).map(toAbsoluteUrl))];
            if (urls.length === 0) return;
            try {
                const cache = await caches.open(IMAGE_CACHE_NAME);
                await Promise.all(urls.map(async url => {
                    try {
                        const response = await fetch(url, { cache: "reload" });
                        if (response.ok) await cache.put(url, response.clone());
                    } catch (_) {}
                }));
            } catch (_) {}
        }

        async function hydrateRenderedImages() {
            if (!("caches" in window)) return;
            const images = [...slideRoot.querySelectorAll("img[data-cache-url]")];
            if (images.length === 0) return;
            try {
                const cache = await caches.open(IMAGE_CACHE_NAME);
                for (const img of images) {
                    img.onerror = async () => {
                        const cachedUrl = await getCachedImageObjectUrl(cache, img.dataset.cacheUrl);
                        if (cachedUrl) img.src = cachedUrl;
                    };
                    if (!navigator.onLine || usingCache) {
                        const cachedUrl = await getCachedImageObjectUrl(cache, img.dataset.cacheUrl);
                        if (cachedUrl) img.src = cachedUrl;
                    }
                }
            } catch (_) {}
        }

        async function getCachedImageObjectUrl(cache, url) {
            try {
                const response = await cache.match(url);
                if (!response) return "";
                const blob = await response.blob();
                const objectUrl = URL.createObjectURL(blob);
                objectUrls.push(objectUrl);
                return objectUrl;
            } catch (_) {
                return "";
            }
        }

        function revokeObjectUrls() {
            for (const url of objectUrls) URL.revokeObjectURL(url);
            objectUrls = [];
        }

        function connectWebSocket() {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            try {
                websocket = new WebSocket(WS_URL);
                websocket.onopen = () => {
                    if (screenCode) websocket.send(JSON.stringify({ type: "register", code: screenCode }));
                };
                websocket.onmessage = event => {
                    let message = null;
                    try { message = JSON.parse(event.data); } catch (_) {}
                    if (!message || shouldReloadSlides(message)) refreshSlides({ silent: true });
                };
                websocket.onclose = scheduleWebSocketReconnect;
                websocket.onerror = () => {
                    try { websocket.close(); } catch (_) {}
                    scheduleWebSocketReconnect();
                };
            } catch (_) {
                scheduleWebSocketReconnect();
            }
        }

        function shouldReloadSlides(message) {
            const type = String(message.type || "").toLowerCase();
            return type.includes("slide") || type.includes("update") || type.includes("content") || type === "";
        }

        function scheduleWebSocketReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = window.setTimeout(() => {
                reconnectTimer = null;
                connectWebSocket();
            }, 5000);
        }

        function loadCachedSlides() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                updateCacheInfo(parsed.savedAt);
                return normalizeSlides(parsed.slides || []);
            } catch (_) {
                return [];
            }
        }

        function saveCachedSlides(slides) {
            const payload = { savedAt: new Date().toISOString(), slides };
            localStorage.setItem(CACHE_KEY, JSON.stringify(payload));
            updateCacheInfo(payload.savedAt);
        }

        function updateCacheInfo(savedAt) {
            cacheInfo.textContent = savedAt ? "Кэш: " + formatTime(savedAt) : "Кэш: пусто";
        }

        function updateStatus() {
            statusIndicator.className = "";
            if (isOnline && !usingCache) {
                statusText.textContent = "Онлайн";
            } else if (usingCache) {
                statusIndicator.className = "cached";
                statusText.textContent = "Автономно: кэш";
            } else {
                statusIndicator.className = "offline";
                statusText.textContent = "Офлайн";
            }
        }

        function showLoading(title, text) {
            slideRoot.innerHTML = `<div class="loading-state"><h1>${escapeHtml(title)}</h1><p>${escapeHtml(text)}</p></div>`;
        }

        function showEmptyState(title, text) {
            slideRoot.innerHTML = `<div class="empty-state"><h1>${escapeHtml(title)}</h1><p>${escapeHtml(text)}</p></div>`;
        }

        function setCodeStatus(text, className) {
            codeStatus.textContent = text;
            codeStatus.className = className || "";
        }

        function toAbsoluteUrl(url) {
            try { return new URL(url, window.location.origin).href; }
            catch (_) { return url; }
        }

        function formatDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value);
            return date.toLocaleString("ru-RU");
        }

        function formatTime(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "—";
            return date.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeAttribute(value) {
            return escapeHtml(value).replaceAll("`", "&#096;");
        }
    </script>
</body>
</html>
