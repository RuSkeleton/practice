<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор слайдов</title>

    <style>
        :root {
            --page-background: #10131a;
            --panel-background: #181d27;
            --panel-background-light: #202633;
            --workspace-background: #e8edf4;

            --border-color: #303949;
            --border-color-light: #465266;

            --slide-background: #ffffff;
            --placeholder-background: rgba(255, 255, 255, 0.3);
            --safe-zone-color: rgba(77, 137, 255, 0.24);

            --topbar-height: 64px;
            --bottombar-height: 58px;
            --leftbar-width: 272px;
            --rightbar-width: 320px;

            --panel-padding: 16px;
            --workspace-padding: 28px;
            --corner-radius: 12px;
            --shadow: 0 14px 38px rgba(0, 0, 0, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--page-background);
            font-family: Arial, sans-serif;
        }

        .editor-layout {
            display: grid;
            grid-template-columns:
                var(--leftbar-width)
                minmax(0, 1fr)
                var(--rightbar-width);

            grid-template-rows:
                var(--topbar-height)
                minmax(0, 1fr)
                var(--bottombar-height);

            grid-template-areas:
                "topbar topbar topbar"
                "leftbar workspace rightbar"
                "bottombar bottombar bottombar";

            width: 100vw;
            height: 100vh;
        }

        /* =========================
           Верхняя панель
           ========================= */

        .editor-topbar {
            grid-area: topbar;
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr) 280px;
            gap: 12px;
            padding: 10px 16px;

            background: var(--panel-background);
            border-bottom: 1px solid var(--border-color);
        }

        .topbar-zone {
            min-width: 0;
            height: 100%;
            border-radius: 8px;
            background: var(--panel-background-light);
        }

        /* =========================
           Левая панель
           ========================= */

        .editor-leftbar {
            grid-area: leftbar;
            display: grid;
            grid-template-rows: 48px minmax(0, 1fr) 92px;
            gap: 12px;
            padding: var(--panel-padding);

            min-width: 0;
            min-height: 0;

            background: var(--panel-background);
            border-right: 1px solid var(--border-color);
        }

        .leftbar-tabs,
        .leftbar-main,
        .leftbar-footer,
        .rightbar-header,
        .rightbar-main,
        .rightbar-footer,
        .bottombar-zone {
            min-width: 0;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--panel-background-light);
        }

        .leftbar-main,
        .rightbar-main {
            min-height: 0;
            overflow: hidden;
        }

        /* =========================
           Центральная рабочая зона
           ========================= */

        .editor-workspace {
            grid-area: workspace;

            min-width: 0;
            min-height: 0;
            padding: var(--workspace-padding);
            overflow: auto;

            background-color: var(--workspace-background);
            background-image:
                radial-gradient(
                    circle at 1px 1px,
                    rgba(62, 76, 99, 0.15) 1px,
                    transparent 0
                );

            background-size: 18px 18px;
        }

        .editor-stage {
            display: flex;
            align-items: center;
            justify-content: center;

            width: 100%;
            min-width: 100%;
            min-height: 100%;
        }

        .editor-canvas-shell {
            width: min(100%, 1220px);
            max-height: 100%;
            aspect-ratio: 16 / 9;

            padding: 20px;

            border: 1px dashed var(--border-color-light);
            border-radius: 18px;
            background: var(--placeholder-background);
        }

        .editor-canvas {
            position: relative;

            width: 100%;
            height: 100%;

            overflow: hidden;
            background: var(--slide-background);
            border-radius: var(--corner-radius);
            box-shadow: var(--shadow);
        }

        .editor-canvas-safe-zone {
            position: absolute;
            z-index: 5;
            inset: 5%;

            border: 1px dashed var(--safe-zone-color);
            border-radius: 4px;

            pointer-events: none;
        }

        /* =========================
           Временные декоративные объекты
           ========================= */

        .canvas-decoration {
            position: absolute;
            z-index: 0;

            border-radius: 50%;
            pointer-events: none;
        }

        .canvas-decoration-top {
            top: -18%;
            right: -8%;

            width: 46%;
            aspect-ratio: 1;

            background: linear-gradient(
                135deg,
                rgba(74, 119, 255, 0.22),
                rgba(119, 74, 255, 0.08)
            );
        }

        .canvas-decoration-bottom {
            bottom: -22%;
            left: -10%;

            width: 38%;
            aspect-ratio: 1;

            background: linear-gradient(
                135deg,
                rgba(78, 191, 166, 0.18),
                rgba(78, 129, 255, 0.08)
            );
        }

        /* =========================
           Временный текстовый блок
           ========================= */

        .slide-test-block {
            position: absolute;
            z-index: 1;

            top: 19%;
            left: 12%;

            width: 56%;
            padding: 28px 32px;

            border: 1px solid rgba(55, 92, 158, 0.45);
            border-radius: 12px;

            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 10px 30px rgba(34, 57, 98, 0.12);
        }

        .slide-test-block-title {
            margin: 0 0 14px;

            color: #16223d;
            font-size: clamp(22px, 2.7vw, 48px);
            font-weight: 700;
            line-height: 1.08;
        }

        .slide-test-block-text {
            max-width: 90%;
            margin: 0;

            color: #536078;
            font-size: clamp(12px, 1.35vw, 22px);
            line-height: 1.45;
        }

        /* =========================
           Временный акцентный объект
           ========================= */

        .slide-test-accent {
            position: absolute;
            z-index: 1;

            right: 13%;
            bottom: 18%;

            width: 18%;
            aspect-ratio: 1;

            border-radius: 18px;

            background: linear-gradient(
                145deg,
                #3f6de5,
                #7255db
            );

            box-shadow: 0 18px 34px rgba(64, 82, 160, 0.28);
        }

        .slide-test-accent::after {
            content: "";

            position: absolute;
            inset: 22%;

            border: 2px solid rgba(255, 255, 255, 0.68);
            border-radius: 12px;
        }

        /* =========================
           Правая панель
           ========================= */

        .editor-rightbar {
            grid-area: rightbar;
            display: grid;
            grid-template-rows: 64px minmax(0, 1fr) 110px;
            gap: 12px;
            padding: var(--panel-padding);

            min-width: 0;
            min-height: 0;

            background: var(--panel-background);
            border-left: 1px solid var(--border-color);
        }

        /* =========================
           Нижняя панель
           ========================= */

        .editor-bottombar {
            grid-area: bottombar;
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr) 280px;
            gap: 12px;
            padding: 10px 16px;

            background: var(--panel-background);
            border-top: 1px solid var(--border-color);
        }

        /* =========================
           Средние экраны
           ========================= */

        @media (max-width: 1200px) {
            :root {
                --leftbar-width: 220px;
                --rightbar-width: 260px;
            }

            .editor-topbar,
            .editor-bottombar {
                grid-template-columns: 220px minmax(0, 1fr) 220px;
            }
        }

        /* =========================
           Узкие экраны
           ========================= */

        @media (max-width: 900px) {
            html,
            body {
                overflow: auto;
            }

            .editor-layout {
                height: auto;
                min-height: 100vh;

                grid-template-columns: 1fr;

                grid-template-rows:
                    var(--topbar-height)
                    180px
                    minmax(480px, 1fr)
                    180px
                    var(--bottombar-height);

                grid-template-areas:
                    "topbar"
                    "leftbar"
                    "workspace"
                    "rightbar"
                    "bottombar";
            }

            .editor-topbar,
            .editor-bottombar {
                grid-template-columns: 1fr 1fr 1fr;
            }

            .editor-leftbar {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .editor-rightbar {
                border-top: 1px solid var(--border-color);
                border-left: none;
            }
        }
    </style>
</head>

<body>
    <div class="editor-layout">
        <header class="editor-topbar">
            <div class="topbar-zone"></div>
            <div class="topbar-zone"></div>
            <div class="topbar-zone"></div>
        </header>

        <aside class="editor-leftbar">
            <div class="leftbar-tabs"></div>
            <div class="leftbar-main"></div>
            <div class="leftbar-footer"></div>
        </aside>

        <main class="editor-workspace">
            <div class="editor-stage">
                <div class="editor-canvas-shell">
                    <section class="editor-canvas">
                        <div class="canvas-decoration canvas-decoration-top"></div>
                        <div class="canvas-decoration canvas-decoration-bottom"></div>

                        <div class="editor-canvas-safe-zone"></div>

                        <article class="slide-test-block">
                            <h1 class="slide-test-block-title">
                                Будущий заголовок слайда
                            </h1>

                            <p class="slide-test-block-text">
                                Это временный текстовый блок. Позже его можно будет выделять,
                                перемещать, изменять по размеру и редактировать прямо на холсте.
                            </p>
                        </article>

                        <div class="slide-test-accent"></div>
                    </section>
                </div>
            </div>
        </main>

        <aside class="editor-rightbar">
            <div class="rightbar-header"></div>
            <div class="rightbar-main"></div>
            <div class="rightbar-footer"></div>
        </aside>

        <footer class="editor-bottombar">
            <div class="bottombar-zone"></div>
            <div class="bottombar-zone"></div>
            <div class="bottombar-zone"></div>
        </footer>
    </div>
</body>
</html>
