<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 30px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a3a5e;
        }

            .header h1 {
                font-size: 24px;
                color: #4a9eff;
            }

        .logout-btn {
            padding: 8px 20px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

            .logout-btn:hover {
                background: #c0392b;
            }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid #2a3a5e;
            padding-bottom: 8px;
        }

        .tab {
            padding: 10px 24px;
            background: transparent;
            color: #6a7a9a;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
        }

            .tab:hover {
                color: #fff;
                background: #0f1a2e;
            }

            .tab.active {
                color: #4a9eff;
                background: #0f1a2e;
                border-bottom: 2px solid #4a9eff;
            }

        .tab-content {
            display: none;
        }

            .tab-content.active {
                display: block;
            }

        .card {
            background: #16213e;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

            .card h2 {
                margin-bottom: 20px;
                font-size: 20px;
                color: #4a9eff;
            }

        .form-group {
            margin-bottom: 16px;
        }

            .form-group label {
                display: block;
                margin-bottom: 6px;
                font-weight: 500;
                font-size: 14px;
                color: #a0b4d0;
            }

            .form-group input,
            .form-group textarea,
            .form-group select {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid #2a3a5e;
                border-radius: 8px;
                background: #0f1a2e;
                color: #fff;
                font-size: 15px;
            }

            .form-group textarea {
                min-height: 80px;
                resize: vertical;
            }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-primary {
            padding: 12px 32px;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

            .btn-primary:hover {
                background: #1e8449;
            }

        .btn-secondary {
            padding: 10px 20px;
            background: #2a3a5e;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

            .btn-secondary:hover {
                background: #3a4a6e;
            }

        .form-message {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

            .form-message.success {
                background: #1a3a2a;
                color: #7ddfa0;
            }

            .form-message.error {
                background: #3a1a1a;
                color: #ff6b6b;
            }

        .slide-item,
        .screen-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0f1a2e;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #4a9eff;
        }

        .slide-info,
        .screen-info {
            flex: 1;
        }

        .screen-header {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .screen-name {
            font-weight: 600;
        }

        .screen-code {
            background: #1a2a4a;
            padding: 2px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            color: #4a9eff;
        }

        .screen-status.online {
            color: #27ae60;
        }

        .screen-status.offline {
            color: #6a7a9a;
        }

        .screen-meta {
            font-size: 12px;
            color: #6a7a9a;
            margin-top: 4px;
        }

        .screen-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-connect {
            padding: 6px 16px;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-disconnect {
            padding: 6px 16px;
            background: #e67e22;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn {
            padding: 6px 14px;
            background: transparent;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            border-radius: 6px;
            cursor: pointer;
        }

            .delete-btn:hover {
                background: #ff6b6b;
                color: #fff;
            }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6a7a9a;
        }

        .loading {
            color: #6a7a9a;
            text-align: center;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .tabs {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Управление системой</h1>
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </header>

        <div class="tabs">
            <button class="tab active" data-tab="slides">Слайды</button>
            <button class="tab" data-tab="screens">Экраны</button>
            <button class="tab" data-tab="users">Пользователи</button>
            <button class="tab" data-tab="shit">Тестовая говна</button>
        </div>


        <!-- --------------------------------------------- -->
        <!-- Управление слайдами фронт -->
        <!-- --------------------------------------------- -->


        <div id="tabSlides" class="tab-content active">
            <div class="card">
                <h2>Создать слайд</h2>
                <form id="slideForm">
                    <div class="form-group">
                        <label>Название слайда *</label>
                        <input id="slideName" required placeholder="Введите название" />
                    </div>
                    <div class="form-group">
                        <label>Тип (kind)</label>
                        <select id="slideKind">
                            <option value="announcement">Объявление</option>
                            <option value="image">Изображение</option>
                            <option value="greeting">Поздравление</option>
                            <option value="metric">Показатель</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Дата начала *</label>
                            <input id="startDate" type="datetime-local" required />
                        </div>
                        <div class="form-group">
                            <label>Дата окончания *</label>
                            <input id="endDate" type="datetime-local" required />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Длительность (слотов)</label>
                            <input id="durationSlots" type="number" value="1" min="1" max="4" />
                        </div>
                        <div class="form-group">
                            <label>Режим частоты</label>
                            <select id="frequencyMode">
                                <option value="1">Обычный</option>
                                <option value="2">Часто</option>
                                <option value="3">Очень часто</option>
                                <option value="4">Жёсткий интервал</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="hardIntervalGroup" style="display:none;">
                        <label>Интервал (>1)</label>
                        <input id="hardInterval" type="number" value="5" min="2" />
                    </div>
                    <div class="form-group">
                        <label><input id="isActive" type="checkbox" checked /> Активен</label>
                    </div>
                    <button type="submit" class="btn-primary">Опубликовать</button>
                </form>
                <div id="formMessage" class="form-message"></div>
            </div>

            <div class="card">
                <h2>Все слайды</h2>
                <div id="slidesList"><p class="loading">Загрузка...</p></div>
            </div>
        </div>


        <!-- --------------------------------------------- -->
        <!-- Управление экранами фронт -->
        <!-- --------------------------------------------- -->


        <div id="tabScreens" class="tab-content">
            <div class="card" style="display:block !important; visibility:visible !important; opacity:1 !important;">
                <h2>Подключить экран</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Название</label>
                        <input id="screenName" placeholder="Ресепшн" />
                    </div>
                    <div class="form-group">
                        <label>Расположение</label>
                        <input id="screenLocation" placeholder="1 этаж" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Код доступа (3 цифры)</label>
                        <div style="display: flex; gap: 10px;">
                            <input id="screenCode" placeholder="000" maxlength="3" style="flex: 1;" />
                            <button type="button" id="generateCodeBtn" class="btn-secondary" style="display:inline-block !important; visibility:visible !important; opacity:1 !important;">Сгенерировать</button>
                        </div>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="button" id="addScreenBtn" class="btn-primary" style="display:inline-block !important; visibility:visible !important; opacity:1 !important; width:100%;">Добавить экран</button>
                    </div>
                </div>
                <div id="screenFormMessage" class="form-message"></div>
            </div>

            <div class="card" style="display:block !important; visibility:visible !important; opacity:1 !important;">
                <h2>Список экранов</h2>
                <div id="screensList"><p class="loading">Загрузка...</p></div>
            </div>
        </div>


        <!-- --------------------------------------------- -->
        <!-- Управление пользователями фронт -->
        <!-- --------------------------------------------- -->


        <div id="tabUsers" class="tab-content">
            <div class="card">
                <h2>Управление пользователями</h2>
                <form id="userForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Логин *</label>
                            <input id="userUsername" required />
                        </div>
                        <div class="form-group">
                            <label>Пароль *</label>
                            <input id="userPassword" type="password" required />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>ФИО</label>
                            <input id="userFullName" />
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input id="userEmail" type="email" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Роль</label>
                        <select id="userRole">
                            <option value="hr">HR</option>
                            <option value="admin">Администратор</option>
                            <option value="viewer">Наблюдатель</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" id="userSubmitBtn">Создать</button>
                    <button type="button" class="btn-secondary" id="userCancelBtn" style="display:none;">Отмена</button>
                </form>
                <div id="userFormMessage" class="form-message"></div>
            </div>

            <div class="card">
                <h2>Список пользователей</h2>
                <div id="usersList"><p class="loading">Загрузка...</p></div>
            </div>
        </div>


        <!-- --------------------------------------------- -->
        <!-- Тестовая зона для редактора фронт -->
        <!-- --------------------------------------------- -->


        <div id="tabShit" class="tab-content">

            <div id="preview-place"></div>

            <form id="textForm" class="element-form hidden">
                <div class="form-group">
                    <label>Содержание</label>
                    <textarea id="text-content" placeholder="Введите текст"></textarea>
                </div>
                <button type="submit" class="btn-primary">Сохранить изменения</button>
            </form>


            <form id="sharedTextForm" class="element-form hidden">
                <div class="form-group">
                    <label>Размер шрифта</label>
                    <input id="text-size" type="number" placeholder="14" />
                </div>
                <div class="form-group">
                    <label>Цвет</label>
                    <input id="text-color" type="color" placeholder="#ffffff" />
                </div>
                <button type="submit" class="btn-primary">Сохранить изменения</button>
            </form>

            <form id="imageForm" class="element-form hidden">
                <div class="form-group text-field">
                    <label>Ссылка на изображение</label>
                    <input id="image-content" placeholder="Введите ссылку на изображение" />
                </div>
                <div class="form-group text">
                    <label>Замещающий текст</label>
                    <input id="image-replacement" placeholder="Текст при неудачной загрузке" />
                </div>
                <button type="submit" class="btn-primary">Сохранить изменения</button>
            </form>

            <form id="metricForm" class="element-form hidden">
                <div class="form-group">
                    <label>Отображение метрики</label>
                    <select id="metric-rendering" required>
                        <option value="metric">Одиночное значение</option>
                        <option value="chart-line">Временной ряд, линия</option>
                        <option value="chart-bars">Временной ряд, столбцы</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Название метрики</label>
                    <select id="metric-name" required>
                        <option value="metric">Одиночное значение</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Сохранить изменения</button>
            </form>

            <form id="layoutForm" class="element-form">
                <div class="form-group">
                    <label>Общие параметры</label>
                    <select id="positioning-type" required>
                        <option value="absolute">Независимый</option>
                        <option value="relative">Привязанный к другим элементам</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Абсолютные координаты</label>
                    <label>X</label>
                    <input id="x-coord" placeholder="0" />
                    <label>Y</label>
                    <input id="y-coord" placeholder="0" />
                </div>
                <div class="form-group form-row">
                    <label>Расстояние от других элементов в относительных координатах</label>
                    <label>Слева</label>
                    <input id="left-padding" placeholder="0" />
                    <label>Справа</label>
                    <input id="right-padding" placeholder="0" />
                    <label>Сверху</label>
                    <input id="top-padding" placeholder="0" />
                    <label>Снизу</label>
                    <input id="bottom-padding" placeholder="0" />
                </div>
                <button type="submit" class="btn-primary">Сохранить изменения</button>
            </form>


            <div id="formMessage" class="form-message"></div>
            <div id="preview-place"></div>
        </div>
    </div>

    <script src="slide_rendering.js"></script>
    <script src="utils.js"></script>
    <script>

        // ---------------------------------------------
        // Управление слайдами, скрипты
        // ---------------------------------------------


        const API_BASE = window.location.origin + '/api';
        let token = localStorage.getItem('token');
        if (!token) { window.location.href = 'main.html'; }
        let currentUserRole = '';

        document.getElementById('logoutBtn').addEventListener('click', function () {
            localStorage.removeItem('token');
            window.location.href = 'main.html';
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const tabId = 'tab' + this.dataset.tab.charAt(0).toUpperCase() + this.dataset.tab.slice(1);
                const target = document.getElementById(tabId);
                if (target) target.classList.add('active');
                if (this.dataset.tab === 'screens') {
                    loadScreens();
                }
                if (this.dataset.tab === 'users') {
                    loadUsers();
                }
            });
        });

        function localDateTimeToUtcIso(value) {
            if (!value) return null;

            // input[type="datetime-local"] возвращает локальное время без часового пояса.
            // new Date(value) трактует его как локальное время браузера,
            // а toISOString() переводит в UTC и добавляет Z.
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return null;

            return date.toISOString();
        }

        // Показывать/скрывать поле интервала при смене режима частоты
        document.getElementById('frequencyMode').addEventListener('change', function () {
            const group = document.getElementById('hardIntervalGroup');
            group.style.display = (this.value === '4') ? 'block' : 'none';
        });

        function setElementsByTemplate() {
            let els;
            var kind = document.getElementById("slideKind").value;
            if (kind === "image") {
                els = [
                    { id: "title", type: "text", role: "title", value: "Текст", text: { fontSize: 58, fontWeight: 800, color: "#ffffff", textAlign: "center", verticalAlign: "middle" }, layout: { positioning: "relative", x: 160, y: 80, align: "center", zIndex: 2} },
                    { id: "image", type: "image", role: "main_image", src: "https://static.1000.menu/img/content-v2/97/7b/36007/prostoi-i-vkusnyi-shokoladnyi-tort_1762166750_0_w9vmk7h_max.jpg", alt: "Описание изображения", shape: { width: 780, height: 640, objectFit: "fill"}, layout: { positioning: "relative", x: 420, y: 220, align: "center", zIndex: 2} }
                ];
            } else if (kind === "greeting") {
                els = [
                    { id: "title", type: "text", role: "title", value: "Поздравляем!", text: { fontSize: 68, fontWeight: 800, color: "#ffffff", textAlign: "center", verticalAlign: "middle" }, layout: { positioning: "relative", x: 160, y: 120, align: "center", zIndex: 2 } },
                    { id: "name", type: "text", role: "person_name", value: "ФИО", text: { fontSize: 56, fontWeight: 700, color: "#ffffff", textAlign: "center", verticalAlign: "middle" }, layout: { positioning: "relative", x: 220, y: 230, align: "center", zIndex: 2 } },
                    { id: "body", type: "text", role: "body", value: "Повод для праздника", text: { fontSize: 40, color: "#ffffff", textAlign: "center", verticalAlign: "middle" }, layout: { positioning: "relative", x: 260, y: 520, align: "center", zIndex: 2 } }
                ];
            } else if (kind === "metric") {
                els = [
                    { id: "title", type: "text", role: "title", value: "Годовой отчет 2025", text: { "textColor": "#ffffff", "textAlign": "center", "verticalAlign": "middle", "fontSize": 64, "fontFamily": "Arial", "fontWeight": 800 }, "layout": { "positioning": "relative", "x": 160, "y": 120, "zIndex": 2 } },
                    { "id": "metric1", "type": "metric", "chartType": "line", "value": 87, "chart": { "unit": "%", "labels": ["Янв", "Фев", "Мар"], "datasets": [10, 20, 15] }, "text": { "textColor": "#ffffff", "textAlign": "center", "verticalAlign": "middle", "fontSize": 48, "fontFamily": "Arial", "fontWeight": 700 }, "shape": { "width": 300, "height": 150, "fit": "contain" }, "layout": { "positioning": "absolute", "x": 810, "y": 340, "zIndex": 2 } },
                    { "id": "body", "type": "text", "role": "body", "value": "Все молодцы", "text": { "textColor": "#e0e0e0", "textAlign": "center", "verticalAlign": "middle", "fontSize": 42, "fontFamily": "Arial", "fontWeight": 400 }, "layout": { "positioning": "absolute", "x": 220, "y": 540, "zIndex": 2 } }
                ];
            } else if (kind === "announcement") {
                // announcement
                els = [
                    { id: "title", "type": "text", "role": "title", "value": "Заголовок", "text": { "textColor": "#ffffff", "textAlign": "center", "verticalAlign": "middle", fontSize: 64, "fontWeight": 800 }, "layout": { "x": 160, "y": 120, "zIndex": 2 } },
                    { "id": "body", "type": "text", "role": "body", "value": "Текст", "text": { "textColor": "#ffffff", "textAlign": "center", "verticalAlign": "middle", "fontSize": 42 }, "layout": { "x": 220, "y": 320, "zIndex": 2 } }
                ];
            }
            return els;
        };

        // Формируем background и elements в зависимости от типа
        const background = { type: "gradient", value: "default" };
        let elements = [];

        document.getElementById("slideKind").addEventListener('change', function () {
            elements = setElementsByTemplate();
            pseudoUpdateRedactor();
        });
        elements = setElementsByTemplate();

        document.getElementById('slideForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const name = document.getElementById('slideName').value;
            const kind = document.getElementById('slideKind').value;
            const startDateLocal = document.getElementById('startDate').value;
            const endDateLocal = document.getElementById('endDate').value;
            const startDate = localDateTimeToUtcIso(startDateLocal);
            const endDate = localDateTimeToUtcIso(endDateLocal);

            if (!startDate || !endDate) {
                const msg = document.getElementById('formMessage');
                msg.textContent = 'Ошибка: некорректные дата/время показа';
                msg.className = 'form-message error';
                return;
            }

            if (new Date(startDate).getTime() >= new Date(endDate).getTime()) {
                const msg = document.getElementById('formMessage');
                msg.textContent = 'Ошибка: дата окончания должна быть позже даты начала';
                msg.className = 'form-message error';
                return;
            }
            const durationSlots = parseInt(document.getElementById('durationSlots').value) || 1;
            const frequencyMode = parseInt(document.getElementById('frequencyMode').value);
            const hardInterval = parseInt(document.getElementById('hardInterval').value) || null;
            const isActive = document.getElementById('isActive').checked;

            const slideData = {
                name,
                kind,
                start_date: startDate,
                end_date: endDate,
                is_active: isActive,
                duration_slots: durationSlots,
                frequency_mode: frequencyMode,
                hard_interval: (frequencyMode === 4) ? hardInterval : null,
                is_emergency: false,
                alarm_type: null,
                background,
                elements
            };

            try {
                const response = await fetch(API_BASE + '/slides', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(slideData)
                });
                const msg = document.getElementById('formMessage');
                if (response.ok) {
                    msg.textContent = 'Слайд создан!';
                    msg.className = 'form-message success';
                    document.getElementById('slideForm').reset();
                    document.getElementById('isActive').checked = true;
                    loadSlides();
                } else {
                    const err = await response.json();
                    msg.textContent = 'Ошибка: ' + (err.detail || 'Неизвестная ошибка');
                    msg.className = 'form-message error';
                }
            } catch {
                document.getElementById('formMessage').textContent = 'Ошибка подключения к серверу';
                document.getElementById('formMessage').className = 'form-message error';
            }
        });

        async function loadSlides() {
            try {
                const response = await fetch(API_BASE + '/slides', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const slides = await response.json();
                    renderSlides(slides);
                }
            } catch { }
        }

        function renderSlides(slides) {
            const container = document.getElementById('slidesList');
            if (!slides || !slides.length) {
                container.innerHTML = '<div class="empty-state">Нет слайдов</div>';
                return;
            }
            const kindMap = { announcement: 'Объявление', image: 'Изображение', greeting: 'Поздравление', metric: 'Показатель' };
            container.innerHTML = slides.map(s => {
                const active = s.is_active && new Date(s.start_date) <= new Date() && new Date(s.end_date) >= new Date();
                return '<div class="slide-item" style="border-left-color: ' + (active ? '#27ae60' : '#6a7a9a') + '">' +
                    '<div class="slide-info">' +
                    '<div>' + (s.name || '(без названия)') + '</div>' +
                    '<div style="font-size:12px;color:#6a7a9a;">' +
                    (kindMap[s.kind] || s.kind) +
                    (active ? ' Активен' : ' Неактивен') +
                    (s.frequency_mode === 4 ? ' (интервал ' + s.hard_interval + ')' : '') +
                    ' ' + new Date(s.start_date).toLocaleDateString() + ' -> ' + new Date(s.end_date).toLocaleDateString() +
                    '</div></div>' +
                    '<button class="delete-btn" onclick="deleteSlide(' + s.id + ')">Удалить</button></div>';
            }).join('');
        }

        async function deleteSlide(id) {
            if (!confirm('Удалить этот слайд?')) return;
            try {
                await fetch(API_BASE + '/slides/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                loadSlides();
            } catch { }
        }


        // ---------------------------------------------
        // Управление экранами, скрипты
        // ---------------------------------------------



        const generateBtn = document.getElementById('generateCodeBtn');
        const addBtn = document.getElementById('addScreenBtn');

        if (generateBtn) {
            generateBtn.addEventListener('click', async function () {
                try {
                    const response = await fetch('/api/generate-code');
                    const data = await response.json();
                    document.getElementById('screenCode').value = data.code || '000';
                } catch (error) {
                    console.error('Ошибка генерации кода:', error);
                    document.getElementById('screenCode').value = '000';
                }
            });
        }

        if (addBtn) {
            addBtn.addEventListener('click', async function () {
                const code = document.getElementById('screenCode').value;
                if (!code || code.length !== 3 || !/^\d{3}$/.test(code)) {
                    showScreenMessage('Введите 3 цифры', 'error');
                    return;
                }
                const data = {
                    code: code,
                    name: document.getElementById('screenName').value || null,
                    location: document.getElementById('screenLocation').value || null
                };
                try {
                    const response = await fetch(API_BASE + '/screens', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify(data)
                    });
                    if (response.ok) {
                        showScreenMessage('Экран добавлен', 'success');
                        document.getElementById('screenName').value = '';
                        document.getElementById('screenLocation').value = '';
                        document.getElementById('screenCode').value = '';
                        loadScreens();
                    } else {
                        const err = await response.json();
                        showScreenMessage('Ошибка: ' + (err.detail || 'Неизвестная ошибка'), 'error');
                    }
                } catch {
                    showScreenMessage('Ошибка подключения к серверу', 'error');
                }
            });
        }

        function showScreenMessage(text, type) {
            const el = document.getElementById('screenFormMessage');
            el.textContent = text;
            el.className = 'form-message ' + type;
            setTimeout(function () { el.textContent = ''; el.className = 'form-message'; }, 5000);
        }

        async function loadScreens() {
            try {
                const response = await fetch(API_BASE + '/screens', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const screens = await response.json();
                    renderScreens(screens);
                }
            } catch { }
        }

        function renderScreens(screens) {
            const container = document.getElementById('screensList');
            if (!screens || !screens.length) {
                container.innerHTML = '<div class="empty-state">Нет экранов</div>';
                return;
            }
            container.innerHTML = screens.map(function (s) {
                return '<div class="screen-item">' +
                    '<div class="screen-info">' +
                    '<div class="screen-header">' +
                    '<span class="screen-name">' + (s.name || 'Без названия') + '</span>' +
                    '<span class="screen-code">' + s.code + '</span>' +
                    '<span class="screen-status ' + (s.is_online ? 'online' : 'offline') + '">' + (s.is_online ? 'Онлайн' : 'Оффлайн') + '</span>' +
                    (s.is_connected ? 'Подключён' : 'Ожидает') +
                    '</div>' +
                    (s.location ? '<div class="screen-meta">' + s.location + '</div>' : '') +
                    '</div>' +
                    '<div class="screen-actions">' +
                    (!s.is_connected ? '<button class="btn-connect" onclick="connectScreen(' + s.id + ')">Подключить</button>' : '<button class="btn-disconnect" onclick="disconnectScreen(' + s.id + ')">Отключить</button>') +
                    '<button class="delete-btn" onclick="deleteScreen(' + s.id + ')">Удалить</button>' +
                    '</div></div>';
            }).join('');
        }

        async function connectScreen(id) {
            try {
                await fetch(API_BASE + '/screens/' + id + '/connect', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                loadScreens();
            } catch { }
        }

        async function disconnectScreen(id) {
            if (!confirm('Отключить этот экран?')) return;
            try {
                await fetch(API_BASE + '/screens/' + id + '/disconnect', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                loadScreens();
            } catch { }
        }

        async function deleteScreen(id) {
            if (!confirm('Удалить этот экран?')) return;
            try {
                await fetch(API_BASE + '/screens/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                loadScreens();
            } catch { }
        }



        // ---------------------------------------------
        // Управление пользователями, скрипты
        // ---------------------------------------------



        let editingUserId = null;

        async function loadUsers() {
            try {
                const response = await fetch(API_BASE + '/users', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const users = await response.json();
                    renderUsers(users);
                } else if (response.status === 403) {
                    document.getElementById('usersList').innerHTML =
                        '<div class="empty-state">Доступ запрещён (требуется администратор)</div>';
                } else {
                    document.getElementById('usersList').innerHTML =
                        '<div class="empty-state">Ошибка загрузки пользователей</div>';
                }
            } catch {
                document.getElementById('usersList').innerHTML =
                    '<div class="empty-state">Ошибка подключения к серверу</div>';
            }
        }

        function renderUsers(users) {
            const container = document.getElementById('usersList');
            if (!users || !users.length) {
                container.innerHTML = '<div class="empty-state">Нет пользователей</div>';
                return;
            }
            container.innerHTML = users.map(u => `
                            <div class="slide-item" style="border-left-color: ${u.is_active ? '#27ae60' : '#6a7a9a'};">
                                <div class="slide-info">
                                    <div><strong>${u.username}</strong> (${u.full_name || '—'})</div>
                                    <div style="font-size:12px;color:#6a7a9a;">
                                        ${u.email || 'Нет email'} • Роль: ${u.role}
                                        ${u.is_active ? 'Активен' : 'Неактивен'}
                                    </div>
                                </div>
                                <div style="display:flex; gap:8px;">
                                    <button class="btn-secondary" onclick="editUser(${u.id})">✎</button>
                                    <button class="delete-btn" onclick="deleteUser(${u.id})">Удалить</button>
                                </div>
                            </div>
                        `).join('');
        }

        async function deleteUser(id) {
            if (!confirm('Удалить пользователя?')) return;
            try {
                const response = await fetch(API_BASE + '/users/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    loadUsers();
                } else {
                    alert('Ошибка при удалении');
                }
            } catch {
                alert('Ошибка подключения');
            }
        }

        // Функция загрузки профиля пользователя (добавлена из feature/user-logic)
        async function loadUserProfile() {
            try {
                const response = await fetch(API_BASE + '/users/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const user = await response.json();
                    currentUserRole = user.role || 'viewer';
                    applyRoleRestrictions();
                } else {
                    console.error('Ошибка получения профиля, статус:', response.status);
                    document.querySelector('.container').innerHTML = '<div class="empty-state">Ошибка загрузки профиля. Проверьте права доступа.</div>';
                }
            } catch (error) {
                console.error('Ошибка сети:', error);
                document.querySelector('.container').innerHTML = '<div class="empty-state">Ошибка сети. Проверьте подключение к серверу.</div>';
            }
        }

        function applyRoleRestrictions() {
            const role = currentUserRole;
            const tabSlides = document.querySelector('[data-tab="slides"]');
            const tabScreens = document.querySelector('[data-tab="screens"]');
            const tabUsers = document.querySelector('[data-tab="users"]');
            const contentSlides = document.getElementById('tabSlides');
            const contentScreens = document.getElementById('tabScreens');
            const contentUsers = document.getElementById('tabUsers');

            if (role === 'admin') {
                if (tabSlides) tabSlides.style.display = '';
                if (tabScreens) tabScreens.style.display = '';
                if (tabUsers) tabUsers.style.display = '';
                if (contentSlides) contentSlides.style.display = '';
                if (contentScreens) contentScreens.style.display = '';
                if (contentUsers) contentUsers.style.display = '';
                loadSlides();
                loadScreens();
                loadUsers();
                return;
            }

            if (role === 'hr') {
                if (tabSlides) tabSlides.style.display = '';
                if (tabScreens) tabScreens.style.display = '';
                if (tabUsers) tabUsers.style.display = 'none';
                if (contentSlides) contentSlides.style.display = '';
                if (contentScreens) contentScreens.style.display = '';
                if (contentUsers) contentUsers.style.display = 'none';
                loadSlides();
                loadScreens();
                return;
            }

            if (role === 'viewer') {
                window.location.href = '/index.html';
                return;
            }

            // Если роль неизвестна – скрываем всё
            if (tabSlides) tabSlides.style.display = 'none';
            if (tabScreens) tabScreens.style.display = 'none';
            if (tabUsers) tabUsers.style.display = 'none';
            if (contentSlides) contentSlides.style.display = 'none';
            if (contentScreens) contentScreens.style.display = 'none';
            if (contentUsers) contentUsers.style.display = 'none';
            document.querySelector('.container').innerHTML = '<div class="empty-state">Недостаточно прав для доступа к панели управления</div>';
        }

        function editUser(id) {
            fetch(API_BASE + '/users/' + id, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(res => {
                    if (!res.ok) throw new Error('Ошибка загрузки');
                    return res.json();
                })
                .then(user => {
                    editingUserId = id;
                    document.getElementById('userUsername').value = user.username;
                    document.getElementById('userFullName').value = user.full_name || '';
                    document.getElementById('userEmail').value = user.email || '';
                    document.getElementById('userRole').value = user.role || 'hr';
                    document.getElementById('userPassword').placeholder = 'Оставьте пустым, чтобы не менять';
                    document.getElementById('userPassword').required = false;
                    document.getElementById('userSubmitBtn').textContent = 'Сохранить';
                    document.getElementById('userCancelBtn').style.display = 'inline-block';
                    document.getElementById('userFormMessage').textContent = '';
                    document.getElementById('userFormMessage').className = 'form-message';
                })
                .catch(() => {
                    alert('Не удалось загрузить данные пользователя');
                });
        }

        function resetUserForm() {
            editingUserId = null;
            document.getElementById('userForm').reset();
            document.getElementById('userPassword').required = true;
            document.getElementById('userPassword').placeholder = '';
            document.getElementById('userSubmitBtn').textContent = 'Создать';
            document.getElementById('userCancelBtn').style.display = 'none';
            document.getElementById('userFormMessage').textContent = '';
            document.getElementById('userFormMessage').className = 'form-message';
        }

        document.getElementById('userCancelBtn').addEventListener('click', resetUserForm);

        document.getElementById('userForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const data = {
                username: document.getElementById('userUsername').value,
                full_name: document.getElementById('userFullName').value || null,
                email: document.getElementById('userEmail').value || null,
                role: document.getElementById('userRole').value,
                password: document.getElementById('userPassword').value
            };
            const url = editingUserId ? API_BASE + '/users/' + editingUserId : API_BASE + '/users';
            const method = editingUserId ? 'PUT' : 'POST';
            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });
                const msg = document.getElementById('userFormMessage');
                if (response.ok) {
                    msg.textContent = editingUserId ? 'Пользователь обновлён' : 'Пользователь создан';
                    msg.className = 'form-message success';
                    resetUserForm();
                    loadUsers();
                } else {
                    const err = await response.json();
                    msg.textContent = 'Ошибка: ' + (err.detail || 'Неизвестная ошибка');
                    msg.className = 'form-message error';
                }
            } catch {
                document.getElementById('userFormMessage').textContent = 'Ошибка подключения к серверу';
                document.getElementById('userFormMessage').className = 'form-message error';
            }
        });

        document.addEventListener('DOMContentLoaded', function () {
            loadUserProfile();
        });

        setInterval(loadSlides, 5000);



        // ---------------------------------------------
        // Тестовая зона для редактора, скрипты
        // ---------------------------------------------


        let redactedElIndex = -1;

        function pseudoUpdateRedactor() {
            renderSlide({background, elements}, document.getElementById("preview-place"));
            document.getElementById("preview-place").querySelectorAll('.slide-element').forEach((el, index) => {
                el.addEventListener('click', function (event) {
                    const formsOfSeparateElements = document.querySelectorAll(".element-form");
                    redactedElIndex = index;
                    console.log(redactedElIndex);
                    formsOfSeparateElements.forEach(form => {
                        form.classList.add("hidden");
                    });
                    if (this.classList.contains('slide-text')) {
                        document.getElementById("textForm").classList.remove("hidden");
                        fillTextFormWithValues(document.getElementById("textForm"), elements[index]);
                        document.getElementById("text-content").focus();
                    }
                    else if (this.classList.contains('slide-image-element')) {
                        document.getElementById("imageForm").classList.remove("hidden");
                        fillImageFormWithValues(document.getElementById("imageForm"), elements[index]);
                        document.getElementById("image-content").focus();
                    }
                    else if (this.classList.contains("slide-chart") || this.classList.contains("metric-value")) {
                        document.getElementById("metricForm").classList.remove("hidden");
                        fillMetricFormWithValues(document.getElementById("metricForm"), elements[index]);
                    };

                });
            });
        };

        function fillTextFormWithValues(textform, element) {
            textform.querySelector("#text-content").value = element.value;
            textform.querySelector("#text-size").value = element.text.fontSize;
            textform.querySelector("#text-color").value = element.text.color;
        }

        function fillImageFormWithValues(imageform, element) {
            imageform.querySelector("#image-content").value = element.src;
            imageform.querySelector("#image-replacement").value = element.alt;
        }

        function fillMetricFormWithValues(metricform, element) {
            if (element.type === "metric") {
                metricform.querySelector("#image-content").value = "metric";
            } else if (element.type === "clart" && element.chartType === "bar") {
                metricform.querySelector("#image-content").value = "chart-bar";
            } else {
                metricform.querySelector("#image-content").value = "chart-line";
            }
        }

        document.getElementById("textForm").addEventListener('submit', async function (e) {
            e.preventDefault();
            console.log(elements[redactedElIndex].value);
            elements[redactedElIndex].value = document.getElementById("text-content").value;
            elements[redactedElIndex].layout.fontSize = parseInt(document.getElementById("text-size").value);
            elements[redactedElIndex].layout.color = document.getElementById("text-color").value;
            pseudoUpdateRedactor();
        });

        document.getElementById("imageForm").addEventListener('submit', async function (e) {
            e.preventDefault();
            elements[redactedElIndex].src = document.getElementById("image-content").value;
            elements[redactedElIndex].alt = document.getElementById("image-replacement").value;
            pseudoUpdateRedactor();
        });

        document.getElementById("metricForm").addEventListener('submit', async function (e) {
            e.preventDefault();

            if (document.getElementById("metric-rendering").value === "metric") {
                elements[redactedElIndex].type = "metric";
            } else if (document.getElementById("metric-rendering").value === "chart-bar") {
                elements[redactedElIndex].type = "chart";
                elements[redactedElIndex].chartType = "bar";
            } else {
                elements[redactedElIndex].type = "chart";
                elements[redactedElIndex].chartType = "line";
            }
            pseudoUpdateRedactor();
        });
        pseudoUpdateRedactor();
    </script>
</body>
</html>
