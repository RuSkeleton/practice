[alembic]
script_location = backend/migrations
prepend_sys_path = .
version_path_separator = os

# Технический fallback. Во время запуска backend/migrations/env.py заменяет
# это значение на DATABASE_URL из backend.config, чтобы приложение и Alembic
# гарантированно работали с одной базой.
sqlalchemy.url = sqlite:///./data/signage.db

# После генерации новой миграции Alembic форматирует её Black.
# Поэтому black добавлен в requirements.txt.
[post_write_hooks]
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
